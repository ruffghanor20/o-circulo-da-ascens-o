<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Boss Fight — Phaser (NG+ + Lore)</title>
    <style>
      :root{
        --bg:#070a12;
        --panel:#0c1222;
        --line:#1c2a4d;
        --txt:#eaf1ff;
        --muted:#a9b7d6;
        --good:#43f2b2;
        --warn:#ffd36f;
        --bad:#ff6b7a;
        --cyan:#74e6ff;
        --gold:#f2d36a;
        --shadow: 0 12px 30px rgba(0,0,0,.55);
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; margin:0; background: radial-gradient(1200px 800px at 30% 15%, #111a33, var(--bg)); color:var(--txt); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; overflow:hidden; overscroll-behavior:none; }
      #app{ position:relative; width:100%; height:100dvh; min-height:100svh; }
      canvas{ image-rendering: crisp-edges; image-rendering: pixelated; }

      .topbar{
        position:absolute; left:0; top:0; width:100%;
        display:flex; gap:10px; align-items:flex-start; justify-content:space-between;
        padding: max(10px, env(safe-area-inset-top)) 12px 10px;
        pointer-events:none;
        z-index: 20;
      }
      .pill{
        pointer-events:auto;
        display:inline-flex; align-items:center; gap:10px;
        padding:8px 10px; border:1px solid var(--line);
        background: rgba(12,18,34,.72); backdrop-filter: blur(6px);
        border-radius: 14px; box-shadow: var(--shadow);
        font-size: 14px;
        max-width: 100%;
      }

      #bossPill{ max-width: min(48vw, 360px); }

      #actionsPill{
        display:flex;
        align-items:center;
        gap:8px;
        flex-wrap:wrap;
      }

      /* Menu rápido: fica recolhido durante a jogatina e abre no canto superior. */
      .quick-menu{
        position:absolute;
        right:12px;
        top:max(10px, env(safe-area-inset-top));
        z-index:30;
        pointer-events:auto;
      }
      .quick-menu-toggle{
        min-width:46px;
        min-height:42px;
        font-size:18px;
        padding:8px 12px;
      }
      .quick-menu-panel{
        display:none;
        margin-top:8px;
        padding:10px;
        border:1px solid var(--line);
        border-radius:14px;
        background: rgba(12,18,34,.92);
        box-shadow: var(--shadow);
        min-width:170px;
      }
      .quick-menu.is-open .quick-menu-panel{ display:grid; gap:8px; }
      .pill b{ font-weight:700; }
      .btn{
        pointer-events:auto;
        cursor:pointer;
        border:1px solid var(--line);
        background: linear-gradient(180deg, rgba(20,30,60,.9), rgba(10,14,26,.85));
        color:var(--txt);
        border-radius: 12px;
        padding:8px 10px;
        font-weight:700;
      }
      .btn[disabled]{ opacity:.55; cursor:not-allowed; }
      .btn:active{ transform: translateY(1px); }

      .modal{
        position:absolute; inset:0; display:none; align-items:center; justify-content:center;
        background: rgba(0,0,0,.55);
        padding: 18px;
      }
      .modal.is-open{ display:flex; }
      .modal-card{
        width:min(980px, 96vw);
        max-height: min(78vh, 900px);
        overflow:auto;
        background: linear-gradient(180deg, rgba(12,18,34,.96), rgba(8,10,18,.96));
@@ -184,70 +222,85 @@
        font-size: 12px;
        box-shadow: var(--shadow);
        pointer-events:none;
      }
      .bar{
        width: 180px;
        height: 10px;
        border-radius: 999px;
        border: 1px solid rgba(28,42,77,.9);
        background: rgba(7,10,18,.55);
        overflow:hidden;
      }
      .fill{
        height:100%;
        width:100%;
        background: linear-gradient(90deg, rgba(255,107,122,.95), rgba(242,211,106,.9));
      }
      .sep{ height:1px; background: rgba(28,42,77,.6); margin: 12px 0; }

      .hint b{ color: var(--txt); }

      @media (max-width: 520px){
        .pill{ font-size: 13px; }
        .hint{ display:none; }
      }

      @media (max-width: 980px){
        .topbar{ flex-wrap:wrap; row-gap:8px; padding-right:68px; }
        #statsPill{ order:1; width:100%; justify-content:space-between; flex-wrap:wrap; }
        #bossPill{ order:2; width:100%; max-width:none; }
      }

      @media (orientation: portrait) and (max-width: 980px){
        .quick-menu{ right:10px; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="topbar">
        <div class="pill" id="statsPill">
          <span>❤️ <b id="hp">100</b></span>
          <span>⚔️ <b id="atk">10</b></span>
          <span>🛡️ <b id="def">5</b></span>
          <span>✨ Lv <b id="lv">1</b></span>
          <span>🪙 <b id="coins">0</b></span>
        </div>
        <div class="pill" id="bossPill" title="Vida do Boss">
          <span>👹 Boss Lv <b id="bossLv">3</b></span>
          <div class="bar" aria-label="Vida do Boss">
            <div class="fill" id="bossHpFill" style="width:100%"></div>
          </div>
          <span class="small" id="bossHpText">—</span>
        </div>
      </div>

      <!-- Menu recolhido para mobile/desktop: pausa automaticamente ao abrir. -->
      <div class="quick-menu" id="quickMenu">
        <button class="btn quick-menu-toggle" id="btnMenuToggle" aria-expanded="false" aria-controls="menuPanel" title="Abrir menu">☰</button>
        <div class="quick-menu-panel" id="menuPanel">
          <button class="btn" id="btnShop">Loja</button>
          <button class="btn" id="btnInv">Inventário</button>
          <button class="btn" id="btnSkills">Árvore</button>
          <button class="btn" id="btnPause">Pause</button>
          <button class="btn" id="btnFate" style="display:none">Destino</button>
          <button class="btn" id="btnAch">Conquistas</button>
          <button class="btn" id="btnReset" title="Limpa progresso local">Reset</button>
        </div>
      </div>

      <div class="hint">
        <b>Controles:</b> joystick = mover • <b>Ataque</b> = botão • <b>Esquiva</b> = botão
        <br/>Derrote ~<b>10 bosses</b> para liberar <b>Destino</b> (finais + New Game+).
      </div>

      <div class="toast" id="toast">
        <div class="spark">🏆</div>
        <div>
          <p class="t" id="toastTitle">Conquista desbloqueada!</p>
          <p class="s" id="toastSub">—</p>
        </div>
      </div>

      <!-- Fate Modal -->
      <div class="modal" id="fateModal" aria-hidden="true">
